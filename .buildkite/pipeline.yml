steps:
  - group: ":julia: Julia"
    steps:
      - label: "Julia {{matrix.julia}}"
        plugins:
          - JuliaCI/julia#v1:
              version: "{{matrix.julia}}"
          - JuliaCI/julia-test#v1:
              test_args: "--quickfail"
        commands: |
          unset LD_LIBRARY_PATH
        agents:
          queue: "juliagpu"
          cuda: "*"
          gpu: "a100"
        timeout_in_minutes: 90
        matrix:
          setup:
            julia:
              - "1.11"
              - "1.12"
              - "1.13"
